spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false   # en pruebas usamos ddl-auto de Hibernate sobre H2 en memoria

  cache:
    type: simple      # en pruebas no dependemos de un Redis real

  data:
    redis:
      host: localhost
      port: 6399   # puerto ficticio; no se usa porque cache.type=simple

app:
  jwt:
    secret: "TEST_SECRET_KEY_SOLO_PARA_PRUEBAS_UNITARIAS_1234567890"
    expiration-ms: 3600000
    cookie-name: "access_token"
