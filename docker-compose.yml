services:
  postgres:
    image: postgres:16
    container_name: pfc-postgres
    environment:
      POSTGRES_DB: pfc_db
      POSTGRES_USER: pfc_user
      POSTGRES_PASSWORD: pfc_password
    ports:
      - "5432:5432"
    volumes:
      - pfc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfc_user -d pfc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pfc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pfc-redis-commander
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  pfc_postgres_data:
